name: Sync, Build and Deploy

on:
  # 手动触发
  workflow_dispatch:

  # 每天凌晨 2 点自动检查更新
  schedule:
    - cron: "0 2 * * *"

  # 推送到 main 分支时触发
  push:
    branches: [main]

# 设置权限
permissions:
  contents: write
  pages: write
  id-token: write

# 确保同一时间只有一个部署在运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 任务 1：同步上游更新
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      has-updates: ${{ steps.check-updates.outputs.has-updates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/SagerNet/sing-box-dashboard.git || true
          git fetch upstream

      - name: Check for updates
        id: check-updates
        run: |
          # 检查是否有新提交
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Commits behind upstream: $BEHIND"

          if [ "$BEHIND" -gt 0 ]; then
            echo "has-updates=true" >> $GITHUB_OUTPUT
            echo "✅ Found $BEHIND new commit(s)" >> $GITHUB_STEP_SUMMARY

            # 显示更新日志
            echo "## 📋 Update Log" >> $GITHUB_STEP_SUMMARY
            git log --oneline HEAD..upstream/main >> $GITHUB_STEP_SUMMARY
          else
            echo "has-updates=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Merge upstream changes
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          git merge upstream/main --no-edit || {
            echo "❌ Merge conflict detected" >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Push changes
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          git push origin main
          echo "✅ Successfully synced with upstream" >> $GITHUB_STEP_SUMMARY

  # 任务 2：构建和部署
  build-and-deploy:
    needs: sync-upstream
    runs-on: ubuntu-latest
    # 即使没有更新，如果是手动触发或 push 也要构建
    if: |
      always() &&
      (needs.sync-upstream.outputs.has-updates == 'true' ||
       github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..." >> $GITHUB_STEP_SUMMARY
          npm ci

      - name: Build
        run: |
          echo "🔨 Building dashboard..." >> $GITHUB_STEP_SUMMARY
          npm run build

          # 显示构建信息
          echo "## 📊 Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- Build time: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Node version: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- Output size: $(du -sh dist | cut -f1)" >> $GITHUB_STEP_SUMMARY

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "📅 Deployed at: $(date)" >> $GITHUB_STEP_SUMMARY
