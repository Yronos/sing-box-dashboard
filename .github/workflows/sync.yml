name: Auto Sync with Upstream

on:
  # 手动触发
  workflow_dispatch:

  # 每天凌晨 2 点自动检查
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/SagerNet/sing-box-dashboard.git || true
          git fetch upstream
          git fetch upstream --tags

      - name: Check for updates
        id: check-updates
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Commits behind upstream: $BEHIND"

          if [ "$BEHIND" -gt 0 ]; then
            echo "has-updates=true" >> $GITHUB_OUTPUT
            echo "✅ Found $BEHIND new commit(s)" >> $GITHUB_STEP_SUMMARY

            # 显示即将合并的提交
            echo "### New commits:" >> $GITHUB_STEP_SUMMARY
            git log --oneline HEAD..upstream/main | head -10 >> $GITHUB_STEP_SUMMARY
          else
            echo "has-updates=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Sync submodules
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          # 更新子模块到上游最新
          git submodule update --init --recursive --remote
          echo "✅ Submodules updated" >> $GITHUB_STEP_SUMMARY

      - name: Merge upstream changes
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          # 尝试合并上游，优先使用上游的更改（theirs 策略）
          git merge upstream/main --no-edit -X theirs || {
            echo "❌ Merge conflict detected" >> $GITHUB_STEP_SUMMARY
            echo "### Conflicted files:" >> $GITHUB_STEP_SUMMARY
            git diff --name-only --diff-filter=U >> $GITHUB_STEP_SUMMARY
            exit 1
          }

          echo "✅ Successfully merged upstream/main" >> $GITHUB_STEP_SUMMARY

      - name: Configure for GitHub Pages
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          # 获取仓库名称
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          # 修改 vite.config.ts 添加 base 路径（仅此一处修改）
          sed -i 's/export default defineConfig({/export default defineConfig({\n  base: "\/'"$REPO_NAME"'\/",/' vite.config.ts

          # 提交这个必要的配置改动
          git add vite.config.ts
          git commit -m "chore: configure base path for GitHub Pages deployment" || true

          echo "✅ Configured base path for GitHub Pages" >> $GITHUB_STEP_SUMMARY

      - name: Push to origin
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          git push origin main

          echo "✅ Synced and pushed to origin/main" >> $GITHUB_STEP_SUMMARY

      - name: Setup pnpm
        if: steps.check-updates.outputs.has-updates == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.check-updates.outputs.has-updates == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies and build
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm generate
          pnpm build
          echo "✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY

      - name: Upload to GitHub Pages
        if: steps.check-updates.outputs.has-updates == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.check-updates.outputs.has-updates == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        if: steps.check-updates.outputs.has-updates == 'true'
        run: |
          echo "🚀 Successfully deployed to GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "Visit: https://${{ github.repository_owner }}.github.io/$(echo "${{ github.repository }}" | cut -d'/' -f2)" >> $GITHUB_STEP_SUMMARY
